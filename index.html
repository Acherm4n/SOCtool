<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JDLThreatIntel v2 — SOC Investigation Platform</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Share+Tech+Mono&family=Major+Mono+Display&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  /* ── HACKER / THREAT DARK THEME ─────────────────────────────
     Terminal green primary, blood red threats, amber warnings,
     CRT phosphor glow, scanlines. Deep black ops background.
  ── */
  --bg:#05070a;             /* near-black tactical                   */
  --bg2:#0a0e13;            /* card surface                          */
  --bg3:#0f141b;            /* inner panel                           */
  --bg4:#141a22;            /* hover surface                         */
  --bg5:#1a2230;            /* deep raised                           */
  --border:#1a2330;
  --border2:#26334a;
  --border3:#3a4a66;

  /* Hacker green primary, blood red threat */
  --accent:#00ff9c;         /* phosphor green                        */
  --accent2:#00cc7a;
  --accent3:#ff3b3b;        /* blood red — threat                    */
  --accent4:#ff00aa;        /* magenta cyber-glitch                  */

  --success:#00ff9c;
  --danger:#ff2d4a;         /* hot red                               */
  --warn:#ffb000;           /* amber alert                           */
  --info:#00e5ff;           /* electric cyan                         */

  --text:#d4f0e0;           /* slight green tint terminal text       */
  --text2:#7a9a8a;
  --text3:#4a6a5a;
  --text4:#2a3a32;

  --mono:'Share Tech Mono','JetBrains Mono',monospace;
  --display:'Rajdhani','Share Tech Mono',sans-serif;
  --glitch:'Major Mono Display',monospace;

  --glow-green:0 0 8px rgba(0,255,156,0.35), 0 0 24px rgba(0,255,156,0.15);
  --glow-red:0 0 8px rgba(255,45,74,0.4), 0 0 24px rgba(255,45,74,0.2);
  --glow-amber:0 0 8px rgba(255,176,0,0.35);
  --glow-cyan:0 0 8px rgba(0,229,255,0.35);

  --topbar-bg:rgba(5,7,10,0.92);
}

/* ── TACTICAL PAPER LIGHT THEME ─────────────────────────────── */
body.light-theme{
  --bg:#e8e4d8;             /* tactical map paper                   */
  --bg2:#f1ede1;
  --bg3:#ddd7c6;
  --bg4:#cfc8b3;
  --bg5:#beb59c;
  --border:#bfb6a0;
  --border2:#9c9078;
  --border3:#6e6450;

  --accent:#1a7a3e;         /* dark forest hacker green             */
  --accent2:#155c2e;
  --accent3:#a01818;        /* blood crimson on paper               */
  --accent4:#7a1a6a;

  --success:#1a7a3e;
  --danger:#a01818;
  --warn:#8a5a00;
  --info:#0a5e7a;

  --text:#1a1a14;           /* ink black                            */
  --text2:#3a3528;
  --text3:#6a6450;
  --text4:#9a9078;
  --topbar-bg:rgba(232,228,216,0.96);

  --glow-green:0 0 0 1px rgba(26,122,62,0.3);
  --glow-red:0 0 0 1px rgba(160,24,24,0.3);
  --glow-amber:0 0 0 1px rgba(138,90,0,0.3);
  --glow-cyan:0 0 0 1px rgba(10,94,122,0.3);
}
body.light-theme::before{opacity:0.12;mix-blend-mode:multiply}
body.light-theme::after{opacity:0.08}
body.light-theme .scanlines{display:none}
body.light-theme .crt-flicker{animation:none}
body.light-theme .logo-name{filter:none;text-shadow:none}
body.light-theme .logo-name::before{display:none}
body.light-theme .topbar{background:var(--topbar-bg);border-bottom:2px solid var(--border2)}
body.light-theme .ioc-raw{background:#1a1814;color:#7aff9c;border-color:#000}
body.light-theme .rpt-ioc-block{background:#1a1814;color:#7aff9c}
body.light-theme .proc-tree{background:#1a1814;color:#d4f0e0;border-color:#000}
body.light-theme .proc-tree .proc-name.normal{color:#7aff9c}
body.light-theme .modal-backdrop{background:rgba(60,55,40,0.7)}
body.light-theme .modal{background:var(--bg2);border:2px solid var(--border2);box-shadow:8px 8px 0 rgba(0,0,0,0.15)}
body.light-theme .card{box-shadow:3px 3px 0 rgba(0,0,0,0.06)}
body.light-theme .stat-n{text-shadow:none}
body.light-theme .risk-score{text-shadow:none}
body.light-theme .kc.kc-active{box-shadow:inset 0 0 0 2px var(--accent)}
body.light-theme .status-dot{box-shadow:none}
body.light-theme .terminal-prompt::before{color:var(--accent)}
body.light-theme .vt-malware-block{background:var(--bg3);box-shadow:3px 3px 0 rgba(160,24,24,0.15)}

/* ── BASE ─────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--mono);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .3s,color .3s;
  position:relative;
}

/* CRT scanlines overlay (dark only) */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(0,255,156,0.025) 0px,
      rgba(0,255,156,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
  pointer-events:none;
  z-index:2;
  opacity:0.6;
  mix-blend-mode:screen;
}

/* Subtle vignette + noise */
body::after{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  background-size:auto, 256px 256px;
  pointer-events:none;
  z-index:1;
  opacity:0.4;
  mix-blend-mode:overlay;
}

@keyframes crtFlicker{
  0%,100%{opacity:1}
  3%{opacity:0.92}
  6%{opacity:1}
  9%{opacity:0.97}
  50%{opacity:0.99}
  93%{opacity:0.95}
}
.crt-flicker{animation:crtFlicker 6s infinite}

.shell{position:relative;z-index:3;max-width:1280px;margin:0 auto;padding:0 20px 40px}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--accent);
  position:sticky;top:0;z-index:100;
  background:var(--topbar-bg);
  backdrop-filter:blur(10px);
  margin:0 -20px;padding:14px 20px;
  box-shadow:0 1px 0 var(--accent), 0 8px 30px rgba(0,255,156,0.05);
}
.logo{display:flex;align-items:center;gap:14px}
.logo-hex{
  width:42px;height:42px;position:relative;
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%);
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  box-shadow:0 0 20px rgba(0,255,156,0.4);
  animation:hexPulse 3s ease-in-out infinite;
}
@keyframes hexPulse{
  0%,100%{box-shadow:0 0 20px rgba(0,255,156,0.4)}
  50%{box-shadow:0 0 30px rgba(255,45,74,0.4)}
}
.logo-hex svg{width:20px;height:20px;color:#000;filter:drop-shadow(0 0 2px rgba(0,0,0,0.8))}

.logo-name{
  font-family:var(--display);
  font-size:24px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--accent);
  text-shadow:0 0 10px rgba(0,255,156,0.6), 0 0 20px rgba(0,255,156,0.3);
  position:relative;
  display:inline-block;
}
.logo-name::before{
  content:attr(data-text);
  position:absolute;left:2px;top:0;
  color:var(--accent3);
  opacity:0.7;
  z-index:-1;
  text-shadow:0 0 8px rgba(255,45,74,0.5);
  animation:glitchShift 3s infinite;
}
@keyframes glitchShift{
  0%,90%,100%{transform:translate(0,0);opacity:0}
  92%{transform:translate(-2px,1px);opacity:0.7}
  94%{transform:translate(2px,-1px);opacity:0.7}
  96%{transform:translate(-1px,0);opacity:0.5}
}
.logo-ver{
  font-size:9px;color:var(--accent3);letter-spacing:3px;
  text-transform:uppercase;margin-top:2px;
  font-family:var(--mono);
}
.logo-ver::before{content:'▸ ';color:var(--accent)}

.topbar-right{display:flex;align-items:center;gap:14px}
.worker-status{
  display:flex;align-items:center;gap:7px;
  font-size:11px;color:var(--accent);
  letter-spacing:1.5px;
  font-family:var(--mono);
  text-transform:uppercase;
}
.status-dot{
  width:8px;height:8px;border-radius:0;
  background:var(--success);
  box-shadow:0 0 10px var(--success), 0 0 20px var(--success);
  animation:pulse 1.5s infinite;
  transform:rotate(45deg);
}
@keyframes pulse{
  0%,100%{opacity:1;transform:rotate(45deg) scale(1)}
  50%{opacity:0.4;transform:rotate(45deg) scale(0.7)}
}
.clock{
  font-size:11px;color:var(--text2);letter-spacing:1px;
  font-family:var(--mono);
  border-left:1px solid var(--border2);padding-left:14px;
}
.clock::before{content:'[ ';color:var(--accent)}
.clock::after{content:' ]';color:var(--accent)}

.btn-report{
  display:flex;align-items:center;gap:7px;
  background:transparent;
  border:1px solid var(--accent3);
  border-radius:0;
  color:var(--accent3);
  font-family:var(--mono);font-size:11px;font-weight:700;
  padding:8px 14px;cursor:pointer;
  letter-spacing:2px;text-transform:uppercase;
  transition:all .15s;
  position:relative;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.btn-report:hover{
  background:var(--accent3);color:#000;
  box-shadow:var(--glow-red);
  text-shadow:none;
}

.theme-toggle{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--accent);
  border-radius:0;color:var(--accent);
  font-family:var(--mono);font-size:11px;font-weight:700;
  padding:7px 12px;cursor:pointer;
  letter-spacing:2px;text-transform:uppercase;
  transition:all .15s;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.theme-toggle:hover{background:var(--accent);color:#000;box-shadow:var(--glow-green)}
.theme-toggle svg{width:13px;height:13px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2.5}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.layout{display:grid;grid-template-columns:280px 1fr;gap:20px;margin-top:20px}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

.sidebar{display:flex;flex-direction:column;gap:14px}
.sidebar-section{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-left:3px solid var(--accent);
  border-radius:0;
  overflow:hidden;
  position:relative;
  transition:border-color .2s;
}
.sidebar-section:hover{border-left-color:var(--accent3)}
.sidebar-section::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.5;
}

.ss-hdr{
  padding:10px 14px;
  background:var(--bg3);
  border-bottom:1px solid var(--border2);
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);
}
.ss-hdr::before{content:'[';color:var(--accent3)}
.ss-hdr::after{content:']';color:var(--accent3);margin-left:auto}
.ss-hdr-dot{width:4px;height:14px;background:var(--accent);box-shadow:var(--glow-green)}

.ss-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}

/* ── INPUTS ─────────────────────────────────────────────────── */
.inp-group{display:flex;flex-direction:column;gap:5px}
.inp-label{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--accent3);
  font-family:var(--mono);
}
.inp-label::before{content:'> ';color:var(--accent)}
.inp{
  background:var(--bg);
  border:1px solid var(--border2);
  border-left:2px solid var(--accent);
  border-radius:0;
  color:var(--accent);
  font-family:var(--mono);font-size:13px;
  padding:9px 12px;
  outline:none;transition:all .2s;width:100%;
  caret-color:var(--accent3);
}
.inp:focus{
  border-color:var(--accent);
  border-left-color:var(--accent3);
  box-shadow:var(--glow-green);
  background:var(--bg2);
}
.inp::placeholder{color:var(--text4)}
body.light-theme .inp{color:var(--text);background:var(--bg3)}

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 14px;
  border-radius:0;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  font-family:var(--mono);font-size:11px;font-weight:700;
  cursor:pointer;letter-spacing:2px;text-transform:uppercase;
  transition:all .15s;white-space:nowrap;width:100%;
  position:relative;overflow:hidden;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.btn::before{
  content:'';
  position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,156,0.3),transparent);
  transition:left .5s;
}
.btn:hover::before{left:100%}
.btn:hover{
  background:var(--accent);color:#000;
  box-shadow:var(--glow-green);
  text-shadow:none;
}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn:active{transform:translate(1px,1px)}
.btn-sm{width:auto;padding:5px 10px;font-size:10px}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#000;box-shadow:var(--glow-red)}
.btn-purple{border-color:var(--accent4);color:var(--accent4)}
.btn-purple:hover{background:var(--accent4);color:#000;box-shadow:0 0 12px rgba(255,0,170,0.4)}

.file-inp-wrap{position:relative}
.file-inp-label{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);
  border:1px dashed var(--accent);
  border-radius:0;padding:11px 12px;cursor:pointer;
  transition:all .2s;font-size:11px;color:var(--accent);
  font-family:var(--mono);
  letter-spacing:1px;
}
.file-inp-label:hover{
  border-color:var(--accent3);color:var(--accent3);
  background:var(--bg4);
}
.file-inp-label input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;top:0;left:0}

/* ── TABS ───────────────────────────────────────────────────── */
.main{display:flex;flex-direction:column;gap:16px}
.tab-bar{
  display:flex;gap:2px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-bottom:2px solid var(--accent);
  border-radius:0;padding:4px;
  overflow-x:auto;
}
.tab-btn{
  flex:none;padding:8px 18px;
  border:none;background:none;
  color:var(--text3);
  font-family:var(--mono);
  font-size:11px;font-weight:700;
  cursor:pointer;transition:all .15s;
  letter-spacing:2px;text-transform:uppercase;
  white-space:nowrap;
  border-radius:0;
  position:relative;
}
.tab-btn::before{content:'// ';opacity:0;color:var(--accent3);transition:opacity .15s}
.tab-btn.active{
  background:var(--bg4);
  color:var(--accent);
  text-shadow:0 0 8px rgba(0,255,156,0.5);
  box-shadow:inset 0 -2px 0 var(--accent);
}
.tab-btn.active::before{opacity:1}
.tab-btn:hover:not(.active){color:var(--text2);background:var(--bg3)}

.tab-panel{display:none}
.tab-panel.active{display:block;animation:tabFadeIn .25s ease}
@keyframes tabFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── CARDS ──────────────────────────────────────────────────── */
.card{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:0;
  padding:18px;
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;
  width:14px;height:14px;
  border-top:1px solid var(--accent);
  border-left:1px solid var(--accent);
}
.card::after{
  content:'';
  position:absolute;bottom:0;right:0;
  width:14px;height:14px;
  border-bottom:1px solid var(--accent);
  border-right:1px solid var(--accent);
}
.card:hover{border-color:var(--border3)}

.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);
  font-weight:700;
}
.card-title::before{content:'▸';color:var(--accent3)}
.card-title-accent{width:4px;height:14px;background:var(--accent);box-shadow:var(--glow-green)}
.card-title-accent.orange{background:var(--warn);box-shadow:var(--glow-amber)}
.card-title-accent.purple{background:var(--accent4);box-shadow:0 0 8px rgba(255,0,170,0.4)}
.card-title-accent.green{background:var(--success);box-shadow:var(--glow-green)}

/* ── STATS ──────────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:0;padding:14px;text-align:center;
  position:relative;overflow:hidden;transition:all .2s;
}
.stat-card::before{
  content:'';
  position:absolute;top:0;left:0;width:8px;height:8px;
  border-top:2px solid var(--accent);border-left:2px solid var(--accent);
}
.stat-card::after{
  content:'';
  position:absolute;bottom:0;right:0;width:8px;height:8px;
  border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);
  transition:all .3s;
}
.stat-card:hover::after{width:14px;height:14px}
.stat-n{
  font-size:32px;font-weight:700;line-height:1;
  font-family:var(--display);
  text-shadow:0 0 12px currentColor;
}
.stat-l{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--text3);margin-top:4px;
  font-family:var(--mono);
}
.s-danger .stat-n{color:var(--danger)}
.s-danger::before,.s-danger::after{border-color:var(--danger)}
.s-warn .stat-n{color:var(--warn)}
.s-warn::before,.s-warn::after{border-color:var(--warn)}
.s-ok .stat-n{color:var(--success)}
.s-info .stat-n{color:var(--info)}
.s-info::before,.s-info::after{border-color:var(--info)}

/* ── RISK ───────────────────────────────────────────────────── */
.risk-wrap{display:flex;align-items:center;gap:18px}
.risk-score{
  font-size:64px;font-weight:700;
  font-family:var(--display);
  line-height:1;min-width:90px;
  text-shadow:0 0 20px currentColor;
  letter-spacing:-2px;
}
.risk-right{flex:1}
.risk-label{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:8px;font-weight:700;
  font-family:var(--mono);
}
.risk-label::before{content:'>>> ';color:var(--accent)}
.meter-bg{
  height:12px;background:var(--bg);
  border-radius:0;overflow:hidden;
  border:1px solid var(--border2);
  position:relative;
}
.meter-bg::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 9px,rgba(0,0,0,0.4) 9px,rgba(0,0,0,0.4) 10px);
  pointer-events:none;
}
.meter-fill{
  height:100%;width:0%;
  transition:width 1.2s cubic-bezier(0.4,0,0.2,1);
  background:linear-gradient(90deg,var(--success),var(--warn),var(--danger));
  position:relative;
  box-shadow:0 0 12px currentColor;
}
.meter-ticks{
  display:flex;justify-content:space-between;
  font-size:9px;color:var(--text4);letter-spacing:1px;margin-top:5px;
  font-family:var(--mono);
}

/* ── BADGES ─────────────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-family:var(--mono);
  padding:3px 8px;border-radius:0;
  font-weight:700;letter-spacing:1px;line-height:1.4;
  text-transform:uppercase;
}
.b-danger{background:rgba(255,45,74,0.1);color:var(--danger);border:1px solid var(--danger)}
.b-warn{background:rgba(255,176,0,0.1);color:var(--warn);border:1px solid var(--warn)}
.b-ok{background:rgba(0,255,156,0.08);color:var(--success);border:1px solid var(--success)}
.b-info{background:rgba(0,229,255,0.08);color:var(--info);border:1px solid var(--info)}
.b-purple{background:rgba(255,0,170,0.1);color:var(--accent4);border:1px solid var(--accent4)}
.b-orange{background:rgba(255,176,0,0.08);color:var(--warn);border:1px solid var(--warn)}

/* ── KILLCHAIN ──────────────────────────────────────────────── */
.killchain{display:flex;align-items:center;gap:4px;overflow-x:auto;padding-bottom:6px}
.kc{
  flex:1;min-width:80px;text-align:center;
  padding:12px 8px;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:0;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);transition:all .3s;
  position:relative;cursor:default;
  font-family:var(--mono);
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 50%,calc(100% - 8px) 100%,0 100%,8px 50%);
}
.kc.kc-past{background:rgba(255,176,0,0.08);color:var(--warn);border-color:var(--warn)}
.kc.kc-active{
  background:rgba(255,45,74,0.12);
  border-color:var(--danger);
  color:var(--danger);
  font-weight:700;
  box-shadow:var(--glow-red);
  animation:kcPulse 1.5s ease-in-out infinite;
}
