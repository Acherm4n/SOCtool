<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JDLThreatIntel v2 — SOC Investigation Platform</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05080f;--bg2:#080d1a;--bg3:#0c1222;--bg4:#111a2e;
  --border:#1a2640;--border2:#243556;
  --accent:#00e5ff;--accent2:#00b4cc;--accent3:#ff5533;--accent4:#7b61ff;
  --success:#00e676;--danger:#ff2d4a;--warn:#ffaa00;
  --text:#dce8ff;--text2:#7a94cc;--text3:#3d5282;
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Scanline Effect */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);pointer-events:none;z-index:10}

.shell{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 20px 40px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(5,8,15,0.92);backdrop-filter:blur(12px);margin:0 -20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:14px}
.logo-hex{width:38px;height:38px;display:flex;align-items:center;justify-content:center;clip-path:polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%);background:linear-gradient(135deg,var(--accent),var(--accent4))}
.logo-name{font-family:var(--display);font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-top:20px}

/* SIDEBAR COMPONENTS */
.sidebar-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.ss-hdr{padding:10px 14px;background:var(--bg3);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ss-hdr-dot{width:4px;height:12px;border-radius:2px;background:var(--accent)}
.ss-body{padding:14px}

.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;width:100%;margin-bottom:10px;outline:none}
.inp:focus{border-color:var(--accent)}

.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;width:100%;text-transform:uppercase;transition:0.2s}
.btn:hover{background:rgba(0,229,255,0.1);box-shadow:0 0 15px rgba(0,229,255,0.2)}

/* MAIN CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;position:relative}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:15px}
.stat-card{background:var(--bg3);padding:15px;border-radius:8px;text-align:center;border-bottom:2px solid var(--border)}
.stat-n{font-size:24px;font-weight:700;display:block}

/* AV ENGINE TABLE */
.av-container{display:grid;grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));gap:8px;max-height:400px;overflow-y:auto;margin-top:15px;padding-right:5px}
.av-item{display:flex;justify-content:space-between;background:var(--bg);padding:8px 12px;border-radius:6px;font-size:11px;border:1px solid var(--border)}
.av-malicious{color:var(--danger);font-weight:700}
.av-clean{color:var(--success)}

/* ABUSEIP RESULT */
.abuse-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:15px;margin-top:10px;animation:slideUp 0.3s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* UTILS */
.loading{font-size:11px;color:var(--text3);text-align:center;padding:10px}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="shell">
  <div class="topbar">
    <div class="logo">
      <div class="logo-hex">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="logo-name">JDLThreatIntel v2.0</div>
    </div>
    <div style="font-size:11px; color:var(--text3)">STATUS: <span style="color:var(--success)">● OPERATIONAL</span></div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="ss-hdr"><div class="ss-hdr-dot"></div>VirusTotal Hash Lookup</div>
        <div class="ss-body">
          <input type="text" id="hash-inp" class="inp" placeholder="Enter File Hash...">
          <button class="btn" onclick="doScan()">Analyze Hash</button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="ss-hdr"><div class="ss-hdr-dot" style="background:var(--accent4)"></div>AbuseIPDB Reputation</div>
        <div class="ss-body">
          <input type="text" id="ip-inp" class="inp" placeholder="Enter IP Address...">
          <button class="btn" style="border-color:var(--accent4); color:var(--accent4)" onclick="doIPLookup()">Check IP</button>
          <div id="ip-loading" class="loading" style="display:none"><div class="spin"></div>Querying Database...</div>
          <div id="ip-result"></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="ss-hdr"><div class="ss-hdr-dot" style="background:var(--success)"></div>Session Stats</div>
        <div class="ss-body">
          <div style="font-size:11px; display:flex; flex-direction:column; gap:8px">
            <div style="display:flex; justify-content:space-between"><span>Hashes Scanned:</span><span id="stat-hashes">0</span></div>
            <div style="display:flex; justify-content:space-between"><span>IPs Checked:</span><span id="stat-ips">0</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="card">
        <div class="ss-hdr" style="background:none; border:none; padding:0; margin-bottom:15px">Security Engine Overview</div>
        <div class="stat-grid">
          <div class="stat-card"><span class="stat-n" id="ov-mal" style="color:var(--danger)">0</span><span style="font-size:9px">MALICIOUS</span></div>
          <div class="stat-card"><span class="stat-n" id="ov-sus" style="color:var(--warn)">0</span><span style="font-size:9px">SUSPICIOUS</span></div>
          <div class="stat-card"><span class="stat-n" id="ov-clean" style="color:var(--success)">0</span><span style="font-size:9px">CLEAN</span></div>
          <div class="stat-card"><span class="stat-n" id="ov-total">0</span><span style="font-size:9px">ENGINES</span></div>
        </div>
      </div>

      <div class="card">
        <div class="ss-hdr" style="background:none; border:none; padding:0">Antivirus Vendor Breakdown</div>
        <div id="av-list" class="av-container">
          <div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text3)">Awaiting hash input for multi-engine analysis...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// UPDATE THIS TO YOUR ACTUAL WORKER URL
const WORKER = "https://your-worker-name.workers.dev";

let hashCount = 0;
let ipCount = 0;

async function doScan() {
  const hash = document.getElementById('hash-inp').value.trim();
  if(!hash) return;

  const avList = document.getElementById('av-list');
  avList.innerHTML = '<div style="grid-column:1/-1" class="loading"><div class="spin"></div>Fetching global intelligence...</div>';

  try {
    const r = await fetch(`${WORKER}/vt/${hash}`);
    const res = await r.json();
    const attr = res.data.attributes;
    const stats = attr.last_analysis_stats;
    const engines = attr.last_analysis_results;

    // Update Overview stats
    document.getElementById('ov-mal').textContent = stats.malicious;
    document.getElementById('ov-sus').textContent = stats.suspicious;
    document.getElementById('ov-clean').textContent = stats.harmless;
    document.getElementById('ov-total').textContent = Object.keys(engines).length;

    // Update Vendor Table
    avList.innerHTML = '';
    Object.keys(engines).sort().forEach(vendor => {
      const result = engines[vendor];
      const div = document.createElement('div');
      div.className = 'av-item';
      const statusClass = result.category === 'malicious' ? 'av-malicious' : 'av-clean';
      div.innerHTML = `<span>${vendor}</span><span class="${statusClass}">${result.result || 'clean'}</span>`;
      avList.appendChild(div);
    });

    hashCount++;
    document.getElementById('stat-hashes').textContent = hashCount;

  } catch(e) {
    avList.innerHTML = `<div style="grid-column:1/-1; color:var(--danger)">Analysis failed: ${e.message}</div>`;
  }
}

async function doIPLookup() {
  const ip = document.getElementById('ip-inp').value.trim();
  if(!ip) return;

  const loading = document.getElementById('ip-loading');
  const resultDiv = document.getElementById('ip-result');
  
  loading.style.display = 'block';
  resultDiv.innerHTML = '';

  try {
    const r = await fetch(`${WORKER}/ip/${ip}`);
    const json = await r.json();
    const data = json.data;

    loading.style.display = 'none';
    resultDiv.innerHTML = `
      <div class="abuse-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
          <span style="font-size:10px; color:var(--text3)">REPUTATION</span>
          <span style="color:${data.abuseConfidenceScore > 20 ? 'var(--danger)' : 'var(--success)'}; font-weight:bold">${data.abuseConfidenceScore}% RISK</span>
        </div>
        <div style="font-size:13px; font-weight:bold; color:var(--accent)">${data.isp}</div>
        <div style="font-size:10px; color:var(--text2); margin-top:4px">${data.countryName || 'Unknown Origin'}</div>
        <div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:flex; justify-content:space-between">
           <span style="font-size:10px">Reports: ${data.totalReports}</span>
           <span style="font-size:10px">Age: 90d</span>
        </div>
      </div>
    `;

    ipCount++;
    document.getElementById('stat-ips').textContent = ipCount;

  } catch(e) {
    loading.style.display = 'none';
    resultDiv.innerHTML = `<div style="font-size:10px; color:var(--danger)">Error: ${e.message}</div>`;
  }
}
</script>

</body>
</html>
