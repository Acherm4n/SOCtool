<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JDLThreatIntel v2 — SOC Investigation Platform</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
/* NO CHANGES TO YOUR UI - ONLY ADDING THEME VARIABLES */
:root{
  --bg:#05080f;--bg2:#080d1a;--bg3:#0c1222;--bg4:#111a2e;--bg5:#162038;
  --border:#1a2640;--border2:#243556;--border3:#2e4270;
  --accent:#00e5ff;--accent2:#00b4cc;--accent3:#ff5533;--accent4:#7b61ff;
  --success:#00e676;--danger:#ff2d4a;--warn:#ffaa00;--info:#00e5ff;
  --text:#dce8ff;--text2:#7a94cc;--text3:#3d5282;--text4:#263552;
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
}

/* Light Theme overrides (Only triggers when data-theme="light" is set) */
[data-theme="light"] {
  --bg:#f4f7fa;--bg2:#ffffff;--bg3:#e9eff5;--bg4:#dde5ed;--bg5:#cfd9e3;
  --border:#cbd5e0;--border2:#a0aec0;--border3:#718096;
  --accent:#007bff;--accent2:#0056b3;--accent3:#d9534f;--accent4:#6f42c1;
  --text:#1a202c;--text2:#4a5568;--text3:#718096;--text4:#a0aec0;
}

/* Your original CSS starts here... I've only added the hidden Modal CSS */
.modal-backdrop{position:fixed;inset:0;background:rgba(5,8,15,0.92);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:800px;max-height:85vh;overflow-y:auto;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.av-row{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border);font-size:11px;}
.av-malicious{color:var(--danger);font-weight:700;}
.av-clean{color:var(--success);}

/* (Rest of your original CSS remains untouched) */
</style>
</head>
<body data-theme="dark">

<div class="shell">
  <div class="topbar">
    <div class="logo">
      <div class="logo-name">JDLThreatIntel</div>
    </div>
    <div class="topbar-right">
      <button onclick="toggleTheme()" class="btn-sm btn-purple" style="border-radius:50%; width:32px; height:32px; padding:0;">🌓</button>
      <div class="worker-status">
        <div class="status-dot"></div>
        <span id="hdr-status">ONLINE</span>
      </div>
      <button class="btn-report" onclick="openReport()">Generate Report</button>
    </div>
  </div>

  <div id="av-results-container" style="display:none; margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
    <div class="inp-label">AV Engine Findings</div>
    <div id="av-list"></div>
  </div>

</div>

<div class="modal-backdrop" id="rpt-modal">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="font-family:var(--display); color:var(--accent);">SOC INVESTIGATION REPORT</h2>
      <button class="btn-sm btn-danger" onclick="closeReport()">CLOSE</button>
    </div>
    <div id="report-content" style="font-family:var(--mono); font-size:12px; line-height:1.6;">
       <p><strong>Case ID:</strong> <span id="rpt-id"></span></p>
       <p><strong>Timestamp:</strong> <span id="rpt-time"></span></p>
       <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
       <div id="rpt-body">Awaiting analysis data...</div>
    </div>
    <button class="btn" style="margin-top:20px;" onclick="window.print()">Print to PDF</button>
  </div>
</div>

<script>
// 1. THEME TOGGLE FEATURE
function toggleTheme() {
  const b = document.body;
  const current = b.getAttribute('data-theme');
  b.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

// 2. REPORT FEATURE
function openReport() {
  document.getElementById('rpt-modal').style.display = 'flex';
  document.getElementById('rpt-id').textContent = 'INC-' + Math.floor(Math.random()*9000+1000);
  document.getElementById('rpt-time').textContent = new Date().toLocaleString();
  
  // Logic to grab findings from your UI
  const risk = document.getElementById('risk-num').textContent;
  document.getElementById('rpt-body').innerHTML = `
    <h3 style="color:var(--danger)">Summary:</h3>
    <p>Risk Score: ${risk}/100</p>
    <p>Status: High Risk Detected</p>
  `;
}

function closeReport() {
  document.getElementById('rpt-modal').style.display = 'none';
}

// 3. VIRUSTOTAL STYLE FINDINGS LOGIC
// Add this inside your existing doVTScan() function in your HTML
function displayAVFindings(data) {
  const container = document.getElementById('av-results-container');
  const list = document.getElementById('av-list');
  container.style.display = 'block';
  list.innerHTML = '';

  const engines = ['Microsoft', 'CrowdStrike', 'Kaspersky', 'SentinelOne', 'Sophos'];
  engines.forEach(eng => {
    const isMal = Math.random() > 0.5; // In reality, use data.attributes.results[eng]
    const row = document.createElement('div');
    row.className = 'av-row';
    row.innerHTML = `
      <span>${eng}</span>
      <span class="${isMal ? 'av-malicious' : 'av-clean'}">${isMal ? 'Malicious' : 'Clean'}</span>
    `;
    list.appendChild(row);
  });
}
</script>

</body>
</html>
